<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カタン対戦マッチング</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1612;
  --surface: #2a2420;
  --surface-hover: #342e28;
  --card: #2e2822;
  --border: #4a3f35;
  --border-light: #5a4f45;
  --sand: #d4a853;
  --sand-dim: #b08a3a;
  --sand-glow: #e8c46a;
  --brick: #c45c3c;
  --forest: #4a8c5c;
  --ocean: #3a7ca5;
  --wheat: #d4a853;
  --ore: #7a8a9a;
  --wool: #8cc464;
  --text: #e8ddd0;
  --text-dim: #9a8e80;
  --text-dark: #6a5e50;
  --danger: #c45c3c;
  --danger-hover: #d4705a;
  --radius: 10px;
  --shadow: 0 4px 20px rgba(0,0,0,0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Hex pattern background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(212,168,83,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(196,92,60,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 80%, rgba(74,140,92,0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 24px 20px 60px;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 36px;
  padding: 32px 20px;
  position: relative;
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--sand), transparent);
}

.header h1 {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  color: var(--sand);
  letter-spacing: 0.05em;
  text-shadow: 0 2px 12px rgba(212,168,83,0.25);
}

.header .subtitle {
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-top: 8px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

/* Resource icons */
.resource-bar {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-top: 16px;
}

.resource-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  opacity: 0.7;
}

/* Sections */
.section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 24px;
  box-shadow: var(--shadow);
}

.section-title {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 1rem;
  color: var(--sand);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title .icon {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
}

/* Player Input */
.input-row {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}

.input-row input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  color: var(--text);
  font-family: inherit;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s;
}

.input-row input::placeholder {
  color: var(--text-dark);
}

.input-row input:focus {
  border-color: var(--sand-dim);
}

.btn {
  border: none;
  border-radius: 8px;
  padding: 12px 20px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.btn-primary {
  background: var(--sand);
  color: var(--bg);
}

.btn-primary:hover {
  background: var(--sand-glow);
  transform: translateY(-1px);
}

.btn-accent {
  background: var(--forest);
  color: #fff;
}

.btn-accent:hover {
  background: #5a9c6c;
  transform: translateY(-1px);
}

.btn-danger {
  background: transparent;
  color: var(--danger);
  border: 1px solid var(--danger);
  padding: 6px 12px;
  font-size: 0.8rem;
}

.btn-danger:hover {
  background: var(--danger);
  color: #fff;
}

.btn-small {
  padding: 6px 14px;
  font-size: 0.8rem;
}

.btn-ghost {
  background: transparent;
  color: var(--text-dim);
  border: 1px solid var(--border);
}

.btn-ghost:hover {
  border-color: var(--border-light);
  color: var(--text);
}

/* Player List */
.player-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.player-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-radius: 8px;
  background: var(--bg);
  border: 1px solid transparent;
  transition: all 0.2s;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}

.player-item:hover {
  border-color: var(--border);
}

.player-check {
  appearance: none;
  width: 20px;
  height: 20px;
  border: 2px solid var(--border-light);
  border-radius: 5px;
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
  transition: all 0.2s;
}

.player-check:checked {
  background: var(--forest);
  border-color: var(--forest);
}

.player-check:checked::after {
  content: '✓';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #fff;
  font-size: 12px;
  font-weight: bold;
}

.player-name {
  flex: 1;
  font-size: 0.95rem;
  font-weight: 500;
}

.player-name.inactive {
  color: var(--text-dark);
  text-decoration: line-through;
}

.player-badge {
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 700;
  letter-spacing: 0.05em;
}

.badge-active {
  background: rgba(74,140,92,0.2);
  color: var(--forest);
  border: 1px solid rgba(74,140,92,0.3);
}

.badge-inactive {
  background: rgba(122,138,154,0.15);
  color: var(--ore);
  border: 1px solid rgba(122,138,154,0.2);
}

.player-delete {
  background: none;
  border: none;
  color: var(--text-dark);
  cursor: pointer;
  font-size: 1.1rem;
  padding: 4px;
  border-radius: 4px;
  transition: all 0.2s;
  line-height: 1;
}

.player-delete:hover {
  color: var(--danger);
  background: rgba(196,92,60,0.1);
}

.player-count {
  text-align: right;
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.player-count strong {
  color: var(--sand);
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 32px;
  color: var(--text-dark);
  font-size: 0.9rem;
}

/* Match Section */
.match-controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

/* Tables */
.tables-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
  margin-top: 20px;
}

.table-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  animation: fadeUp 0.4s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.table-header {
  padding: 12px 16px;
  font-family: 'Dela Gothic One', sans-serif;
  font-size: 0.85rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.table-header .count {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 0.75rem;
  opacity: 0.7;
}

.table-players {
  padding: 8px 16px 16px;
}

.table-player {
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.9rem;
  display: flex;
  align-items: center;
  gap: 8px;
}

.table-player:last-child {
  border-bottom: none;
}

.table-player .num {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 700;
  flex-shrink: 0;
}

/* Table color themes */
.table-brick { border-top: 3px solid var(--brick); }
.table-brick .table-header { background: rgba(196,92,60,0.1); color: var(--brick); }
.table-brick .num { background: rgba(196,92,60,0.2); color: var(--brick); }

.table-forest { border-top: 3px solid var(--forest); }
.table-forest .table-header { background: rgba(74,140,92,0.1); color: var(--forest); }
.table-forest .num { background: rgba(74,140,92,0.2); color: var(--forest); }

.table-ocean { border-top: 3px solid var(--ocean); }
.table-ocean .table-header { background: rgba(58,124,165,0.1); color: var(--ocean); }
.table-ocean .num { background: rgba(58,124,165,0.2); color: var(--ocean); }

.table-wheat { border-top: 3px solid var(--wheat); }
.table-wheat .table-header { background: rgba(212,168,83,0.1); color: var(--wheat); }
.table-wheat .num { background: rgba(212,168,83,0.2); color: var(--wheat); }

.table-ore { border-top: 3px solid var(--ore); }
.table-ore .table-header { background: rgba(122,138,154,0.1); color: var(--ore); }
.table-ore .num { background: rgba(122,138,154,0.2); color: var(--ore); }

.table-wool { border-top: 3px solid var(--wool); }
.table-wool .table-header { background: rgba(140,196,100,0.1); color: var(--wool); }
.table-wool .num { background: rgba(140,196,100,0.2); color: var(--wool); }

/* Timer */
.timer-section {
  text-align: center;
}

.timer-display {
  font-family: 'Dela Gothic One', sans-serif;
  font-size: clamp(3rem, 10vw, 5.5rem);
  color: var(--sand);
  letter-spacing: 0.05em;
  margin: 20px 0;
  text-shadow: 0 0 30px rgba(212,168,83,0.2);
  transition: color 0.3s;
  line-height: 1;
}

.timer-display.warning {
  color: var(--brick);
  text-shadow: 0 0 30px rgba(196,92,60,0.3);
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.timer-label {
  font-size: 0.85rem;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.timer-controls {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 20px;
  flex-wrap: wrap;
}

.timer-set {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 16px;
}

.timer-set label {
  font-size: 0.85rem;
  color: var(--text-dim);
}

.timer-set input {
  width: 70px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  color: var(--text);
  font-family: inherit;
  font-size: 0.9rem;
  text-align: center;
  outline: none;
}

.timer-set input:focus {
  border-color: var(--sand-dim);
}

.timer-progress {
  width: 100%;
  height: 4px;
  background: var(--bg);
  border-radius: 2px;
  margin-top: 20px;
  overflow: hidden;
}

.timer-progress-bar {
  height: 100%;
  background: var(--sand);
  border-radius: 2px;
  transition: width 1s linear, background 0.3s;
}

.timer-progress-bar.warning {
  background: var(--brick);
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 24px;
  color: var(--text);
  font-size: 0.9rem;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  z-index: 1000;
  transition: transform 0.3s ease;
  pointer-events: none;
}

.toast.visible {
  transform: translateX(-50%) translateY(0);
}

/* Audio notification indicator */
.timer-audio-note {
  font-size: 0.75rem;
  color: var(--text-dark);
  margin-top: 10px;
}

/* Waiting card */
.waiting-card {
  border-top: 3px dashed var(--text-dark);
  background: var(--bg);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  animation: fadeUp 0.4s ease;
}

.waiting-card .table-header {
  background: rgba(122,138,154,0.08);
  color: var(--text-dim);
}

.waiting-card .num {
  background: rgba(122,138,154,0.15);
  color: var(--text-dim);
}

/* Lock button & locked state */
.table-actions {
  display: flex;
  padding: 0 12px 10px;
  gap: 6px;
}

.btn-lock {
  flex: 1;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 0.75rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}

.btn-lock:hover {
  border-color: var(--sand-dim);
  color: var(--sand);
}

.btn-lock.locked {
  background: rgba(212,168,83,0.12);
  border-color: var(--sand-dim);
  color: var(--sand);
}

.table-card.is-locked {
  box-shadow: 0 0 0 1px var(--sand-dim), 0 4px 16px rgba(212,168,83,0.1);
}

.table-card.is-locked .table-header::after {
  content: '🔒';
  font-size: 0.75rem;
  margin-left: 6px;
}

@media (max-width: 600px) {
  .app { padding: 16px 12px 40px; }
  .section { padding: 16px; }
  .tables-grid { grid-template-columns: 1fr; }
  .match-controls { flex-direction: column; }
  .match-controls .btn { width: 100%; text-align: center; }
  .input-row { flex-wrap: nowrap; }
  .input-row input { min-width: 0; }
  .input-row .btn { width: auto; flex-shrink: 0; }
}
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <h1>カタン マッチング</h1>
    <p class="subtitle">Settlers of Catan ─ Table Matcher</p>
    <div class="resource-bar">
      <div class="resource-dot" style="background:var(--brick)"></div>
      <div class="resource-dot" style="background:var(--forest)"></div>
      <div class="resource-dot" style="background:var(--wheat)"></div>
      <div class="resource-dot" style="background:var(--ore)"></div>
      <div class="resource-dot" style="background:var(--wool)"></div>
    </div>
  </header>

  <!-- Player Registration -->
  <div class="section">
    <div class="section-title">
      <span class="icon" style="background:rgba(212,168,83,0.15);color:var(--sand);">👥</span>
      参加者管理
    </div>
    <div class="input-row">
      <input type="text" id="playerInput" placeholder="名前を入力..." maxlength="20">
      <button class="btn btn-primary" onclick="addPlayer()">追加</button>
    </div>
    <div id="playerList" class="player-list"></div>
    <div id="playerCount" class="player-count" style="display:none;"></div>
  </div>

  <!-- Matching -->
  <div class="section">
    <div class="section-title">
      <span class="icon" style="background:rgba(74,140,92,0.15);color:var(--forest);">🎲</span>
      卓分け
    </div>
    <div class="match-controls">
      <button class="btn btn-accent" onclick="matchPlayers()">マッチング実行</button>
      <button class="btn btn-ghost" onclick="clearMatch()">クリア</button>
      <button class="btn btn-ghost" onclick="resetHistory()">履歴リセット</button>
    </div>
    <div id="tablesGrid" class="tables-grid"></div>
  </div>

  <!-- Timer -->
  <div class="section timer-section">
    <div class="section-title" style="justify-content:center;">
      <span class="icon" style="background:rgba(196,92,60,0.15);color:var(--brick);">⏱</span>
      タイマー
    </div>
    <div class="timer-label">残り時間</div>
    <div id="timerDisplay" class="timer-display">68:00</div>
    <div class="timer-progress">
      <div id="timerProgressBar" class="timer-progress-bar" style="width:100%"></div>
    </div>
    <div class="timer-controls">
      <button class="btn btn-primary" id="timerStartBtn" onclick="toggleTimer()">スタート</button>
      <button class="btn btn-ghost" onclick="resetTimer()">リセット</button>
    </div>
    <div class="timer-set">
      <label>設定時間（分）:</label>
      <input type="number" id="timerMinutes" value="68" min="1" max="999" onchange="setTimerMinutes()">
    </div>
    <div class="timer-audio-note">🔔 残り5分・0分で通知音が鳴ります</div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ── State ──
let players = [];
let nextId = 1;
let tables = [];
let waiting = [];

// 対戦履歴: pairHistory[key] = 直近で同卓だった回数（key = "小id-大id"）
let pairHistory = {};

// Timer state
let timerTotal = 68 * 60;
let timerRemaining = 68 * 60;
let timerInterval = null;
let timerRunning = false;

// ── LocalStorage 保存・復元 ──
const STORAGE_KEY = 'catan_matcher_data';

function saveState() {
  try {
    const data = {
      players,
      nextId,
      tables,
      waiting,
      pairHistory,
      timerTotal,
      timerRemaining,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.players) players = data.players;
    if (data.nextId) nextId = data.nextId;
    if (data.tables) tables = data.tables;
    if (data.waiting) waiting = data.waiting;
    if (data.pairHistory) pairHistory = data.pairHistory;
    if (data.timerTotal) timerTotal = data.timerTotal;
    if (data.timerRemaining != null) timerRemaining = data.timerRemaining;
  } catch(e) {}
}

// 起動時に復元
loadState();

// ── Audio context for notification ──
function playBeep(frequency = 880, duration = 200, count = 3) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    for (let i = 0; i < count; i++) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = frequency;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.35);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.35 + duration / 1000);
      osc.start(ctx.currentTime + i * 0.35);
      osc.stop(ctx.currentTime + i * 0.35 + duration / 1000);
    }
  } catch(e) {}
}

// ── Toast ──
let toastTimeout;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('visible'), 2500);
}

// ── Players ──
function addPlayer() {
  const input = document.getElementById('playerInput');
  const name = input.value.trim();
  if (!name) return;
  if (players.some(p => p.name === name)) {
    showToast('同名の参加者が既に存在します');
    return;
  }
  players.push({ id: nextId++, name, active: true });
  input.value = '';
  input.focus();
  renderPlayers();
  saveState();
  showToast(`${name} を追加しました`);
}

document.getElementById('playerInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addPlayer();
});

function toggleActive(id) {
  const p = players.find(p => p.id === id);
  if (p) {
    p.active = !p.active;
    renderPlayers();
    saveState();
  }
}

function deletePlayer(id) {
  const p = players.find(p => p.id === id);
  if (p) {
    const name = p.name;
    players = players.filter(p => p.id !== id);
    renderPlayers();
    saveState();
    showToast(`${name} を削除しました`);
  }
}

function renderPlayers() {
  const list = document.getElementById('playerList');
  const countEl = document.getElementById('playerCount');

  if (players.length === 0) {
    list.innerHTML = '<div class="empty-state">参加者を追加してください</div>';
    countEl.style.display = 'none';
    return;
  }

  list.innerHTML = players.map(p => `
    <div class="player-item">
      <input type="checkbox" class="player-check" ${p.active ? 'checked' : ''}
        onchange="toggleActive(${p.id})" title="アクティブ切替">
      <span class="player-name ${p.active ? '' : 'inactive'}">${esc(p.name)}</span>
      <span class="player-badge ${p.active ? 'badge-active' : 'badge-inactive'}">
        ${p.active ? '参加' : '不参加'}
      </span>
      <button class="player-delete" onclick="deletePlayer(${p.id})" title="削除">×</button>
    </div>
  `).join('');

  const active = players.filter(p => p.active).length;
  countEl.style.display = 'block';
  countEl.innerHTML = `全 <strong>${players.length}</strong> 名 ／ アクティブ <strong>${active}</strong> 名`;
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ── Matching ──
const tableThemes = ['table-brick', 'table-forest', 'table-ocean', 'table-wheat', 'table-ore', 'table-wool'];
const tableNames = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'];

function pairKey(a, b) {
  return a < b ? `${a}-${b}` : `${b}-${a}`;
}

function recordHistory(tableList) {
  // 各卓内の全ペアの同卓回数を加算
  tableList.forEach(t => {
    const ids = t.players.map(p => p.id);
    for (let i = 0; i < ids.length; i++) {
      for (let j = i + 1; j < ids.length; j++) {
        const k = pairKey(ids[i], ids[j]);
        pairHistory[k] = (pairHistory[k] || 0) + 1;
      }
    }
  });
}

// 卓の「重複スコア」を計算（低いほど良い）
function calcOverlapScore(group) {
  let score = 0;
  for (let i = 0; i < group.length; i++) {
    for (let j = i + 1; j < group.length; j++) {
      const k = pairKey(group[i].id, group[j].id);
      score += (pairHistory[k] || 0);
    }
  }
  return score;
}

function matchPlayers() {
  const actives = players.filter(p => p.active);
  if (actives.length < 3) {
    showToast('アクティブな参加者が3人以上必要です');
    return;
  }

  // 固定卓に入っているプレイヤーIDを集める
  const lockedTables = tables.filter(t => t.locked);
  const lockedPlayerIds = new Set();
  lockedTables.forEach(t => t.players.forEach(p => lockedPlayerIds.add(p.id)));

  // マッチング対象 = アクティブだが固定卓に入っていない人
  const pool = actives.filter(p => !lockedPlayerIds.has(p.id));

  if (pool.length === 0) {
    showToast('振り分ける参加者がいません');
    return;
  }

  const n = pool.length;

  // 卓サイズ決定（3人or4人卓、余り1-2人は待機）
  let tableSizes = [];

  if (n >= 3) {
    const numFours = Math.floor(n / 4);
    const rem = n % 4;

    if (rem === 0) {
      for (let i = 0; i < numFours; i++) tableSizes.push(4);
    } else if (rem === 3) {
      for (let i = 0; i < numFours; i++) tableSizes.push(4);
      tableSizes.push(3);
    } else if (rem === 1) {
      for (let i = 0; i < numFours; i++) tableSizes.push(4);
    } else if (rem === 2) {
      for (let i = 0; i < numFours; i++) tableSizes.push(4);
    }
  }

  const seated = tableSizes.reduce((a, b) => a + b, 0);
  const waitingSize = n - seated;

  // ── 重複を避ける振り分け ──
  // 複数回シャッフル→スコアリングして最良を採用
  let bestAssignment = null;
  let bestScore = Infinity;
  const attempts = Math.min(200, Math.max(30, n * 10));

  for (let attempt = 0; attempt < attempts; attempt++) {
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    const groups = [];
    let idx = 0;
    for (const size of tableSizes) {
      groups.push(shuffled.slice(idx, idx + size));
      idx += size;
    }
    const waitGroup = shuffled.slice(idx);

    // 全卓の重複スコア合計
    let totalScore = 0;
    for (const g of groups) {
      totalScore += calcOverlapScore(g);
    }

    if (totalScore < bestScore) {
      bestScore = totalScore;
      bestAssignment = { groups, waitGroup };
      if (totalScore === 0) break; // 完全に重複なし
    }
  }

  // 新しい卓を作成（自動で固定）
  const usedNames = new Set(lockedTables.map(t => t.name));
  let nameIdx = 0;
  const newTables = [];
  for (let i = 0; i < bestAssignment.groups.length; i++) {
    while (usedNames.has(`卓 ${tableNames[nameIdx] || (nameIdx + 1)}`)) {
      nameIdx++;
    }
    const name = `卓 ${tableNames[nameIdx] || (nameIdx + 1)}`;
    usedNames.add(name);
    newTables.push({
      name,
      theme: tableThemes[nameIdx % tableThemes.length],
      players: bestAssignment.groups[i],
      locked: true,
    });
    nameIdx++;
  }

  // 履歴に今回の全卓（固定卓 + 新卓）を記録
  recordHistory([...lockedTables, ...newTables]);

  // 固定卓 + 新しい卓を名前順でソート
  tables = [...lockedTables, ...newTables].sort((a, b) => a.name.localeCompare(b.name));
  waiting = bestAssignment.waitGroup;

  renderTables();
  const newCount = newTables.length;
  const waitMsg = waiting.length > 0 ? `（待機 ${waiting.length}名）` : '';
  const historyMsg = bestScore === 0 ? '' : '（※一部重複あり）';
  saveState();
  showToast(`${newCount} 卓を振り分けました${waitMsg}${historyMsg}`);
}

function clearMatch() {
  tables = [];
  waiting = [];
  document.getElementById('tablesGrid').innerHTML = '';
  saveState();
}

function resetHistory() {
  pairHistory = {};
  saveState();
  showToast('対戦履歴をリセットしました');
}

function toggleLock(tableIdx) {
  const target = tables[tableIdx];
  if (target) {
    target.locked = !target.locked;
    tables.sort((a, b) => a.name.localeCompare(b.name));
    renderTables();
    saveState();
    showToast(target.locked ? `${target.name} を固定しました` : `${target.name} の固定を解除しました`);
  }
}

function renderTables() {
  const grid = document.getElementById('tablesGrid');
  if (tables.length === 0 && waiting.length === 0) {
    grid.innerHTML = '';
    return;
  }

  let html = tables.map((t, ti) => `
    <div class="table-card ${t.theme} ${t.locked ? 'is-locked' : ''}" style="animation-delay:${ti * 0.08}s">
      <div class="table-header">
        <span>${esc(t.name)}</span>
        <span class="count">${t.players.length}人</span>
      </div>
      <div class="table-players">
        ${t.players.map((p, pi) => `
          <div class="table-player">
            <span class="num">${pi + 1}</span>
            <span>${esc(p.name)}</span>
          </div>
        `).join('')}
      </div>
      <div class="table-actions">
        <button class="btn-lock ${t.locked ? 'locked' : ''}" onclick="toggleLock(${ti})">
          ${t.locked ? '🔒 固定中' : '🔓 固定する'}
        </button>
      </div>
    </div>
  `).join('');

  if (waiting.length > 0) {
    html += `
      <div class="waiting-card" style="animation-delay:${tables.length * 0.08}s">
        <div class="table-header">
          <span>⏳ 待機</span>
          <span class="count">${waiting.length}人</span>
        </div>
        <div class="table-players">
          ${waiting.map((p, pi) => `
            <div class="table-player">
              <span class="num">${pi + 1}</span>
              <span>${esc(p.name)}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  grid.innerHTML = html;
}

// ── Timer ──
function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function updateTimerDisplay() {
  const display = document.getElementById('timerDisplay');
  const bar = document.getElementById('timerProgressBar');
  display.textContent = formatTime(timerRemaining);

  const pct = timerTotal > 0 ? (timerRemaining / timerTotal) * 100 : 0;
  bar.style.width = pct + '%';

  if (timerRemaining <= 300) {
    display.classList.add('warning');
    bar.classList.add('warning');
  } else {
    display.classList.remove('warning');
    bar.classList.remove('warning');
  }
}

function toggleTimer() {
  if (timerRunning) {
    pauseTimer();
  } else {
    startTimer();
  }
}

function startTimer() {
  if (timerRemaining <= 0) return;
  timerRunning = true;
  document.getElementById('timerStartBtn').textContent = '一時停止';
  document.getElementById('timerStartBtn').classList.remove('btn-primary');
  document.getElementById('timerStartBtn').classList.add('btn-danger');

  let notified5 = timerRemaining <= 300;
  let notified0 = timerRemaining <= 0;

  timerInterval = setInterval(() => {
    timerRemaining--;
    updateTimerDisplay();
    saveState();

    if (timerRemaining === 300 && !notified5) {
      notified5 = true;
      playBeep(660, 200, 3);
      showToast('⚠ 残り5分です！');
    }

    if (timerRemaining <= 0) {
      clearInterval(timerInterval);
      timerRunning = false;
      timerRemaining = 0;
      updateTimerDisplay();
      document.getElementById('timerStartBtn').textContent = 'スタート';
      document.getElementById('timerStartBtn').classList.remove('btn-danger');
      document.getElementById('timerStartBtn').classList.add('btn-primary');
      if (!notified0) {
        playBeep(880, 300, 5);
        showToast('⏰ 時間切れです！');
      }
    }
  }, 1000);
}

function pauseTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  document.getElementById('timerStartBtn').textContent = '再開';
  document.getElementById('timerStartBtn').classList.remove('btn-danger');
  document.getElementById('timerStartBtn').classList.add('btn-primary');
  saveState();
}

function resetTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  const mins = parseInt(document.getElementById('timerMinutes').value) || 68;
  timerTotal = mins * 60;
  timerRemaining = timerTotal;
  updateTimerDisplay();
  document.getElementById('timerStartBtn').textContent = 'スタート';
  document.getElementById('timerStartBtn').classList.remove('btn-danger');
  document.getElementById('timerStartBtn').classList.add('btn-primary');
  saveState();
}

function setTimerMinutes() {
  if (timerRunning) return;
  const mins = parseInt(document.getElementById('timerMinutes').value) || 68;
  timerTotal = mins * 60;
  timerRemaining = timerTotal;
  updateTimerDisplay();
  saveState();
}

// Initial render (復元データを反映)
renderPlayers();
renderTables();
document.getElementById('timerMinutes').value = Math.round(timerTotal / 60);
updateTimerDisplay();
</script>
</body>
</html>
